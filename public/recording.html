<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversation Recorder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Timer */
    #timer {
      font-size: 2.5rem;
      font-variant-numeric: tabular-nums;
      margin-top: 3rem;
      opacity: 0;
      transition: opacity 0.3s;
      height: 3rem;
    }
    #timer.visible { opacity: 1; }

    /* Speaker indicator */
    #speaker-indicator {
      font-size: 1.1rem;
      margin-top: 0.5rem;
      height: 1.5rem;
      opacity: 0;
      transition: opacity 0.3s, color 0.2s;
    }
    #speaker-indicator.visible { opacity: 1; }

    /* Waveform canvas */
    #waveform {
      width: 100%;
      max-width: 400px;
      height: 120px;
      margin-top: 1rem;
    }

    /* Record button area */
    .button-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #record-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: #e53935;
      cursor: pointer;
      transition: transform 0.15s, border-radius 0.3s, background 0.3s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    #record-btn:active { transform: scale(0.93); }
    #record-btn.recording {
      border-radius: 20%;
      background: #c62828;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(229, 57, 53, 0.5); }
      50% { box-shadow: 0 0 0 20px rgba(229, 57, 53, 0); }
    }

    #record-label {
      margin-top: 1rem;
      font-size: 1rem;
      opacity: 0.7;
    }

    /* Processing overlay */
    #processing {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #processing.active { display: flex; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #333;
      border-top-color: #e53935;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #processing-text {
      margin-top: 1rem;
      font-size: 1.1rem;
      opacity: 0.8;
    }

    /* Navigation bar */
    .nav-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: rgba(17,17,17,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 30;
      border-bottom: 1px solid #222;
    }
    .nav-btn {
      background: none;
      border: 1px solid #333;
      color: #aaa;
      padding: 0.35rem 0.7rem;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .nav-btn:hover { border-color: #555; color: #fff; }
    .nav-spacer { flex: 1; }
    .nav-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #666;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Status light */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e53935;
      display: inline-block;
      margin-right: 4px;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #4caf50; }
    .nav-btn.login-btn { display: inline-flex; align-items: center; gap: 0.3rem; }

    /* Login modal */
    #login-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 2rem;
    }
    #login-modal.active { display: flex; }
    .login-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 320px;
    }
    .login-card h3 {
      margin-bottom: 1.2rem;
      font-size: 1.1rem;
      text-align: center;
    }
    .login-card input {
      display: block;
      width: 100%;
      padding: 0.65rem 0.8rem;
      margin-bottom: 0.75rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }
    .login-card input:focus { border-color: #e53935; }
    .login-card button {
      width: 100%;
      padding: 0.7rem;
      background: #e53935;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-card button:hover { background: #c62828; }
    .login-card button:disabled { background: #555; cursor: not-allowed; }
    .login-error {
      color: #e53935;
      font-size: 0.8rem;
      margin-bottom: 0.5rem;
      text-align: center;
      min-height: 1.2rem;
    }
    .login-card .cancel-link {
      display: block;
      text-align: center;
      margin-top: 0.75rem;
      color: #888;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .login-card .cancel-link:hover { color: #fff; }

    /* Results */
    #results {
      display: none;
      position: fixed;
      inset: 0;
      background: #111;
      z-index: 10;
      flex-direction: column;
      overflow: hidden;
    }
    #results.active { display: flex; }

    #results-header {
      padding: 1.2rem 1rem 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
    }
    #results-header h2 {
      font-size: 1.1rem;
      flex: 1;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-btn {
      background: rgba(255,255,255,0.08);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .header-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }
    .header-btn:active { transform: scale(0.96); }

    #send-status {
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      display: none;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    #send-status.success {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #4caf50;
      background: rgba(76,175,80,0.08);
    }
    #send-status.error {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #e53935;
      background: rgba(229,57,53,0.08);
    }
    #send-status.sending {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #ffa726;
      background: rgba(255,167,38,0.08);
    }

    #transcript-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      -webkit-overflow-scrolling: touch;
    }

    .utterance {
      margin-bottom: 0.25rem;
      padding: 0.65rem 0.85rem;
      border-radius: 12px;
      transition: background 0.15s;
    }
    .utterance:hover {
      background: rgba(255,255,255,0.03);
    }
    .utterance .speaker {
      font-weight: 700;
      font-size: 0.75rem;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .utterance .speaker.self { color: #42a5f5; }
    .utterance .speaker.partner { color: #f06292; }
    .utterance .text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: rgba(255,255,255,0.85);
    }

    .utterance-meta {
      font-size: 0.7rem;
      color: #555;
      margin-top: 0.25rem;
    }

    #results-footer {
      padding: 0.75rem 1rem;
      display: flex;
      gap: 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      background: linear-gradient(0deg, #1a1a1a 0%, #111 100%);
    }
    #results-footer button {
      flex: 1;
      padding: 0.7rem;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    #results-footer button:active { transform: scale(0.96); }
    #btn-json { background: rgba(30,136,229,0.15); color: #42a5f5; border: 1px solid rgba(30,136,229,0.3); }
    #btn-json:hover { background: rgba(30,136,229,0.25); }
    #btn-text { background: rgba(67,160,71,0.15); color: #66bb6a; border: 1px solid rgba(67,160,71,0.3); }
    #btn-text:hover { background: rgba(67,160,71,0.25); }
    #btn-new { background: rgba(229,57,53,0.15); color: #ef5350; border: 1px solid rgba(229,57,53,0.3); }
    #btn-new:hover { background: rgba(229,57,53,0.25); }

    /* Speaker assignment modal */
    #speaker-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 2rem;
    }
    #speaker-modal.active { display: flex; }
    #speaker-modal h3 { margin-bottom: 1rem; font-size: 1.2rem; }
    #speaker-modal .sample {
      background: #222;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      width: 100%;
      max-width: 320px;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    #speaker-modal .sample em { opacity: 0.6; font-style: normal; }
    .modal-buttons {
      display: flex;
      gap: 1rem;
    }
    .modal-btn {
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-btn.self { background: #42a5f5; color: #fff; }
    .modal-btn.partner { background: #f06292; color: #fff; }

    @media (max-width: 600px) {
      .nav-btn { padding: 0.5rem 0.9rem; font-size: 0.85rem; }
      .nav-title { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

  <nav class="nav-bar">
    <a class="nav-btn" id="nav-hub" href="/hub.html">Hub</a>
    <a class="nav-btn" id="nav-relationship" href="/relationship.html">Relationship</a>
    <div class="nav-spacer"></div>
    <span class="nav-title">Recorder</span>
    <button class="nav-btn login-btn" id="login-btn" onclick="handleLoginClick()">
      <span class="status-dot" id="status-dot"></span>
      <span id="login-label">Login</span>
    </button>
  </nav>

  <!-- Login modal -->
  <div id="login-modal">
    <div class="login-card">
      <h3>Admin Login</h3>
      <div class="login-error" id="login-error"></div>
      <input type="email" id="login-email" placeholder="Email" autocomplete="email">
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <button id="login-submit" onclick="submitLogin()">Sign In</button>
      <span class="cancel-link" onclick="closeLoginModal()">Cancel</span>
    </div>
  </div>

  <div id="timer" style="margin-top: 4rem;">00:00</div>
  <div id="speaker-indicator"></div>
  <canvas id="waveform"></canvas>

  <div class="button-area">
    <button id="record-btn" aria-label="Record"></button>
    <div id="record-label">Tap to Record</div>
  </div>

  <!-- Processing overlay -->
  <div id="processing">
    <div class="spinner"></div>
    <div id="processing-text">Transcribing...</div>
  </div>

  <!-- Speaker assignment modal -->
  <div id="speaker-modal">
    <h3>Who is Speaker A?</h3>
    <div class="sample">
      <em>First words from Speaker A:</em><br>
      <span id="sample-text"></span>
    </div>
    <div class="modal-buttons">
      <button class="modal-btn self" onclick="assignSpeaker('A')">Self</button>
      <button class="modal-btn partner" onclick="assignSpeaker('B')">Partner</button>
    </div>
  </div>

  <!-- Results screen -->
  <div id="results">
    <div id="results-header">
      <h2>Transcript</h2>
      <button class="header-btn" onclick="sendTranscript()">Re-send</button>
    </div>
    <div id="send-status"></div>
    <div id="transcript-list"></div>
    <div id="results-footer">
      <button id="btn-json" onclick="exportJSON()">JSON</button>
      <button id="btn-text" onclick="exportText()">Text</button>
      <button id="btn-new" onclick="newRecording()">New Recording</button>
    </div>
  </div>

  <script>
    // --- API base (Railway backend when served from Firebase) ---
    const API_BASE = window.location.hostname.includes("firebaseapp.com") || window.location.hostname.includes("web.app")
      ? "https://whatsapp-events-nyc-production.up.railway.app"
      : "";

    // --- Auth ---
    const params = new URLSearchParams(window.location.search);
    let token = params.get('token') || params.get('admin') || localStorage.getItem('adminToken');
    if (token) {
      localStorage.setItem('adminToken', token);
      // Strip token from URL to avoid exposure in history/logs/referrer
      if (params.has('token') || params.has('admin')) {
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }

    function authFetch(url, opts = {}) {
      const headers = opts.headers ? { ...opts.headers } : {};
      if (token) headers["Authorization"] = "Bearer " + token;
      return fetch(API_BASE + url, { ...opts, headers });
    }

    // --- Login UI ---
    const statusDot = document.getElementById('status-dot');
    const loginLabel = document.getElementById('login-label');
    const loginModal = document.getElementById('login-modal');
    const loginError = document.getElementById('login-error');
    const loginEmailInput = document.getElementById('login-email');
    const loginPasswordInput = document.getElementById('login-password');
    const loginSubmitBtn = document.getElementById('login-submit');

    function updateLoginStatus(isLoggedIn) {
      if (isLoggedIn) {
        statusDot.classList.add('connected');
        loginLabel.textContent = 'Logged In';
      } else {
        statusDot.classList.remove('connected');
        loginLabel.textContent = 'Login';
      }
    }

    // Verify token on load
    async function verifyToken() {
      if (!token) { updateLoginStatus(false); return; }
      try {
        const res = await authFetch('/api/logs?limit=1');
        updateLoginStatus(res.ok);
        if (!res.ok) {
          token = null;
          localStorage.removeItem('adminToken');
        }
      } catch {
        updateLoginStatus(false);
      }
    }
    verifyToken();

    function handleLoginClick() {
      if (token) {
        // Already logged in — log out
        token = null;
        localStorage.removeItem('adminToken');
        updateLoginStatus(false);
        updateNavLinks();
        return;
      }
      loginError.textContent = '';
      loginEmailInput.value = '';
      loginPasswordInput.value = '';
      loginModal.classList.add('active');
      loginEmailInput.focus();
    }

    function closeLoginModal() {
      loginModal.classList.remove('active');
    }

    // Allow Enter key to submit
    loginPasswordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitLogin();
    });

    async function submitLogin() {
      const email = loginEmailInput.value.trim();
      const password = loginPasswordInput.value;
      if (!email || !password) {
        loginError.textContent = 'Please enter email and password.';
        return;
      }
      loginSubmitBtn.disabled = true;
      loginSubmitBtn.textContent = 'Signing in...';
      loginError.textContent = '';

      try {
        const res = await fetch(API_BASE + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          loginError.textContent = data.error || 'Login failed.';
          return;
        }
        token = data.token;
        localStorage.setItem('adminToken', token);
        updateLoginStatus(true);
        updateNavLinks();
        closeLoginModal();
      } catch (err) {
        loginError.textContent = 'Network error. Try again.';
      } finally {
        loginSubmitBtn.disabled = false;
        loginSubmitBtn.textContent = 'Sign In';
      }
    }

    // --- State ---
    let mediaRecorder = null;
    let audioChunks = [];
    let audioContext = null;
    let analyser = null;
    let source = null;
    let stream = null;
    let isRecording = false;
    let timerInterval = null;
    let startTime = 0;
    let animationFrame = null;
    let transcriptData = null; // { speakers: {A: "Self", B: "Partner"}, utterances: [...] }
    let speakerMap = null; // loaded from localStorage

    // --- DOM ---
    const recordBtn = document.getElementById('record-btn');
    const recordLabel = document.getElementById('record-label');
    const timerEl = document.getElementById('timer');
    const speakerEl = document.getElementById('speaker-indicator');
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    const processingEl = document.getElementById('processing');
    const processingText = document.getElementById('processing-text');
    const resultsEl = document.getElementById('results');
    const transcriptList = document.getElementById('transcript-list');
    const sendStatus = document.getElementById('send-status');
    const speakerModal = document.getElementById('speaker-modal');
    const sampleText = document.getElementById('sample-text');

    // --- Init ---
    function initCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
    }
    initCanvas();
    window.addEventListener('resize', initCanvas);

    // Load speaker mapping from localStorage
    try {
      const saved = localStorage.getItem('speakerMap');
      if (saved) speakerMap = JSON.parse(saved);
    } catch {}

    // --- Recording ---
    recordBtn.addEventListener('click', async () => {
      if (isRecording) {
        stopRecording();
      } else {
        await startRecording();
      }
    });

    async function startRecording() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        alert('Microphone access denied. Please allow microphone access and try again.');
        return;
      }

      // Audio context for waveform + pitch
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 2048;
      source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);

      // MediaRecorder
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, { mimeType: getSupportedMimeType() });
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      mediaRecorder.onstop = onRecordingStopped;
      mediaRecorder.start(1000); // collect in 1s chunks

      isRecording = true;
      recordBtn.classList.add('recording');
      recordLabel.textContent = 'Tap to Stop';
      timerEl.classList.add('visible');
      speakerEl.classList.add('visible');

      // Start timer
      startTime = Date.now();
      timerInterval = setInterval(updateTimer, 200);

      // Start waveform
      drawWaveform();
    }

    function stopRecording() {
      isRecording = false;
      mediaRecorder.stop();
      stream.getTracks().forEach(t => t.stop());
      recordBtn.classList.remove('recording');
      recordLabel.textContent = 'Tap to Record';
      timerEl.classList.remove('visible');
      speakerEl.classList.remove('visible');
      clearInterval(timerInterval);
      cancelAnimationFrame(animationFrame);

      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }

      // Clear canvas
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
    }

    function getSupportedMimeType() {
      const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
      for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }
      return '';
    }

    // --- Timer ---
    function updateTimer() {
      const elapsed = Date.now() - startTime;
      const mins = Math.floor(elapsed / 60000);
      const secs = Math.floor((elapsed % 60000) / 1000);
      timerEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    // --- Waveform + Pitch Detection ---
    function drawWaveform() {
      if (!isRecording) return;
      animationFrame = requestAnimationFrame(drawWaveform);

      const bufferLength = analyser.fftSize;
      const dataArray = new Float32Array(bufferLength);
      analyser.getFloatTimeDomainData(dataArray);

      // Detect pitch via autocorrelation
      const pitch = detectPitch(dataArray, audioContext.sampleRate);
      let color = '#555'; // silence/gray
      let speakerText = '';

      if (pitch > 0) {
        if (pitch < 180) {
          color = '#42a5f5'; // blue = lower pitch
          speakerText = 'Speaker 1';
        } else {
          color = '#f06292'; // pink = higher pitch
          speakerText = 'Speaker 2';
        }
      }

      speakerEl.textContent = speakerText;
      speakerEl.style.color = color;

      // Draw waveform
      const rect = canvas.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      ctx.clearRect(0, 0, w, h);

      ctx.lineWidth = 2;
      ctx.strokeStyle = color;
      ctx.beginPath();

      const sliceWidth = w / bufferLength;
      let x = 0;
      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i];
        const y = (v + 1) / 2 * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += sliceWidth;
      }
      ctx.stroke();
    }

    function detectPitch(buffer, sampleRate) {
      // Autocorrelation pitch detection
      const SIZE = buffer.length;

      // Check if there's enough signal
      let rms = 0;
      for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
      rms = Math.sqrt(rms / SIZE);
      if (rms < 0.01) return -1; // too quiet

      // Autocorrelation
      const correlations = new Float32Array(SIZE);
      for (let lag = 0; lag < SIZE; lag++) {
        let sum = 0;
        for (let i = 0; i < SIZE - lag; i++) {
          sum += buffer[i] * buffer[i + lag];
        }
        correlations[lag] = sum;
      }

      // Find the first dip then the next peak
      let d = 0;
      while (d < SIZE && correlations[d] > 0) d++;

      let maxVal = -1;
      let maxPos = -1;
      for (let i = d; i < SIZE; i++) {
        if (correlations[i] > maxVal) {
          maxVal = correlations[i];
          maxPos = i;
        }
      }

      if (maxPos === -1) return -1;

      const frequency = sampleRate / maxPos;

      // Only return if in human voice range
      if (frequency >= 70 && frequency <= 400) return frequency;
      return -1;
    }

    // --- After recording stops -> transcribe ---
    async function onRecordingStopped() {
      const mimeType = mediaRecorder.mimeType || 'audio/webm';
      const blob = new Blob(audioChunks, { type: mimeType });

      processingEl.classList.add('active');
      processingText.textContent = 'Transcribing...';

      try {
        const formData = new FormData();
        formData.append('audio', blob, `recording.${mimeType.includes('mp4') ? 'm4a' : 'webm'}`);

        const res = await authFetch('/api/recording/transcribe', {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Transcription failed');
        }

        const data = await res.json();
        processingEl.classList.remove('active');

        if (!data.utterances || data.utterances.length === 0) {
          alert('No speech detected. Try recording again.');
          return;
        }

        handleTranscriptionResult(data);
      } catch (err) {
        processingEl.classList.remove('active');
        alert('Error: ' + err.message);
      }
    }

    // --- Handle transcription result ---
    function handleTranscriptionResult(data) {
      const speakers = [...new Set(data.utterances.map(u => u.speaker))];

      // If we already have a mapping and it covers these speakers, use it
      if (speakerMap && speakers.every(s => speakerMap[s])) {
        finishWithMapping(data, speakerMap);
        return;
      }

      // If only one speaker, default to Self
      if (speakers.length === 1) {
        speakerMap = { [speakers[0]]: 'Self' };
        localStorage.setItem('speakerMap', JSON.stringify(speakerMap));
        finishWithMapping(data, speakerMap);
        return;
      }

      // Show speaker assignment modal
      const firstSpeaker = speakers[0];
      const firstUtterance = data.utterances.find(u => u.speaker === firstSpeaker);
      sampleText.textContent = `"${firstUtterance.text.substring(0, 120)}${firstUtterance.text.length > 120 ? '...' : ''}"`;

      window._pendingData = data;
      window._pendingSpeakers = speakers;
      speakerModal.classList.add('active');
    }

    function assignSpeaker(choice) {
      const data = window._pendingData;
      const speakers = window._pendingSpeakers;
      speakerModal.classList.remove('active');

      if (choice === 'A') {
        // Speaker A is Self
        speakerMap = { [speakers[0]]: 'Self' };
        for (let i = 1; i < speakers.length; i++) speakerMap[speakers[i]] = 'Partner';
      } else {
        // Speaker A is Partner
        speakerMap = { [speakers[0]]: 'Partner' };
        for (let i = 1; i < speakers.length; i++) speakerMap[speakers[i]] = 'Self';
      }

      localStorage.setItem('speakerMap', JSON.stringify(speakerMap));
      finishWithMapping(data, speakerMap);
    }

    function finishWithMapping(data, mapping) {
      transcriptData = {
        speakers: { A: 'Self', B: 'Partner' },
        utterances: data.utterances.map(u => ({
          speaker: mapping[u.speaker] || `Speaker ${u.speaker}`,
          text: u.text,
          start: u.start,
          end: u.end,
        })),
      };

      showResults();
      sendTranscript(); // auto-send
    }

    // --- Show results ---
    function showResults() {
      transcriptList.innerHTML = '';

      for (let i = 0; i < transcriptData.utterances.length; i++) {
        const u = transcriptData.utterances[i];
        const isSelf = u.speaker === 'Self';

        const div = document.createElement('div');
        div.className = 'utterance';

        const speakerDiv = document.createElement('div');
        speakerDiv.className = 'speaker ' + (isSelf ? 'self' : 'partner');
        speakerDiv.textContent = u.speaker;

        const textDiv = document.createElement('div');
        textDiv.className = 'text';
        textDiv.textContent = u.text;

        div.appendChild(speakerDiv);
        div.appendChild(textDiv);

        // Show duration for each utterance
        if (u.start != null && u.end != null) {
          const durSec = ((u.end - u.start) / 1000).toFixed(1);
          const meta = document.createElement('div');
          meta.className = 'utterance-meta';
          meta.textContent = durSec + 's';
          div.appendChild(meta);
        }

        transcriptList.appendChild(div);
      }

      resultsEl.classList.add('active');
    }

    // --- Save transcript to relationship monitor ---
    async function sendTranscript() {
      if (!transcriptData) return;

      sendStatus.className = 'sending';
      sendStatus.textContent = 'Saving to relationship monitor...';

      try {
        // Convert from frontend format to backend format:
        //   speaker: maps to "self" or "partner"
        //   text -> body
        //   start (ms offset from AssemblyAI) -> timestamp (unix seconds)
        const now = Math.floor(Date.now() / 1000);
        const firstStartMs = transcriptData.utterances.length > 0
          ? transcriptData.utterances[0].start
          : 0;

        const utterances = transcriptData.utterances.map(u => ({
          speaker: u.speaker === 'Self' ? 'self' : 'partner',
          body: u.text,
          timestamp: Math.floor(now - (firstStartMs / 1000) + (u.start / 1000)),
        }));

        const res = await authFetch('/api/recording/save-transcript', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ utterances, source: 'in-person' }),
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error ? JSON.stringify(err.error) : 'Save failed');
        }

        const result = await res.json();
        sendStatus.className = 'success';
        sendStatus.textContent = `Saved ${result.imported} messages`;
      } catch (err) {
        sendStatus.className = 'error';
        sendStatus.textContent = 'Save failed: ' + err.message;
      }
    }

    // --- Export ---
    function exportJSON() {
      if (!transcriptData) return;
      download(JSON.stringify(transcriptData, null, 2), 'transcript.json', 'application/json');
    }

    function exportText() {
      if (!transcriptData) return;
      const lines = transcriptData.utterances.map(u => `${u.speaker}: ${u.text}`).join('\n\n');
      download(lines, 'transcript.txt', 'text/plain');
    }

    function download(content, filename, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    // --- New recording ---
    function newRecording() {
      resultsEl.classList.remove('active');
      sendStatus.className = '';
      sendStatus.textContent = '';
      transcriptData = null;
      timerEl.textContent = '00:00';
    }
  </script>
</body>
</html>
